name: Build & Publish

on:
  release:
    types: [published]
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest lancedb pyarrow watchdog loguru pypdf python-docx openpyxl pandas fastapi uvicorn aiofiles httpx python-dotenv pydantic "mcp[cli]"

      - name: Run tests (no network)
        run: |
          # CI checkout 结构不同，rag_mcp 既可能在 src/rag_mcp/ 也可能直接在 src/
          # 两个路径都加入 PYTHONPATH
          export PYTHONPATH="$PWD/src:$PWD/src/rag_mcp:$PWD:$PYTHONPATH"
          # CI flat structure: if rag_mcp files are directly in src/, nest them
          if [ -f src/__init__.py ] && [ ! -d src/rag_mcp ]; then
            mkdir -p src/rag_mcp
            cp -r src/* src/rag_mcp/
            rm -rf src/__init__.py src/*.py src/parsers
          fi
          python -m pytest tests/ -v -m "not network"

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          # CI flat structure fix
          if [ -f src/__init__.py ] && [ ! -d src/rag_mcp ]; then
            mkdir -p src/rag_mcp
            shopt -s extglob
            cp -r src/!(rag_mcp) src/rag_mcp/
            rm -rf src/!(rag_mcp)
          fi
          python -m pip install --upgrade pip build
          pip install -e .
          python build/build_release.py --no-cython

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
